title: Points
description: Visual LiDAR Synthesizer — Node Reference & Guide
remote_theme: just-the-docs/just-the-docs
color_scheme: mono

url: https://aristidesai.github.io/Points
baseurl: /Points

aux_links:
  "Points on GitHub":
    - "https://github.com/AristidesAI/Points"

nav_sort: case_insensitive
back_to_top: true
back_to_top_text: "↑"

search_enabled: true
search:
  heading_level: 2
  previews: 2

mermaid:
  version: "10"

callouts:
  note:
    title: "NOTE"
    color: grey
  warning:
    title: "WARNING"
    color: grey
  tip:
    title: "TIP"
    color: grey

last_edit_timestamp: true
last_edit_time_format: "%Y-%m-%d"

exclude:
  - assets/
  - _sass/
  - _layouts/
  - _includes/
  - Gemfile
  - README.md
