title: Points Docs
description: Visual LiDAR Synthesizer — Node Reference & Integration Guide
remote_theme: just-the-docs/just-the-docs
color_scheme: dark
url: https://points.app
aux_links:
  "Points on GitHub":
    - "https://github.com/aristides/points"

# Navigation
nav_sort: case_insensitive
back_to_top: true
back_to_top_text: "↑ Top"

# Search
search_enabled: true
search:
  heading_level: 3
  previews: 3

# Mermaid diagrams
mermaid:
  version: "10"

# Callouts
callouts:
  note:
    title: Note
    color: blue
  warning:
    title: Warning
    color: red
  tip:
    title: Pro Tip
    color: green

# Footer
last_edit_timestamp: true
last_edit_time_format: "%Y-%m-%d"

# Exclude from nav
exclude:
  - assets/
  - _sass/
